services:
  core:
    image: searxng/searxng:latest
    container_name: searxng-core
    restart: unless-stopped
    ports:
      - "8090:8080"
    volumes:
      - ./core-config:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8090/
      - SEARXNG_PORT=8080
    networks:
      - skills-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  valkey:
    image: valkey/valkey:9-alpine
    container_name: searxng-valkey
    restart: unless-stopped
    command: valkey-server --save 30 1 --loglevel warning
    volumes:
      - valkey-data:/data
    networks:
      - skills-network
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE

volumes:
  valkey-data:

networks:
  skills-network:
    external: true
